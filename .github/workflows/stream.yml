name: Two-hour trial only 

on:
  workflow_dispatch:
    inputs:
      duration:
        description: "مدة التشغيل بالدقائق"
        required: true
        default: "120"

jobs:
  stream:
    runs-on: ubuntu-latest
    timeout-minutes: ${{ fromJSON(inputs.duration) }}

    steps:
      - name: Install FFmpeg & Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg wget

      - name: Download Logo
        run: |
          wget -O logo.png https://up6.cc/2026/06/178122590817961.png

      - name: Stream 1080p HDR
        run: |
          ffmpeg -re \
            -user_agent "Mozilla/5.0" \
            -i "https://worldcup.dzandz496.workers.dev/BNMAX4KHDR.m3u8" \
            -i logo.png \
            -filter_complex "[0:v]scale=1920:1080:flags=lanczos,fps=30,setparams=colorspace=bt2020nc:color_primaries=bt2020:color_trc=smpte2084[bg];[1:v]scale=140:-1[logo];[bg][logo]overlay=W-w-30:H-h-30,format=yuv420p10le" \
            -c:v libx264 \
            -preset veryfast \
            -crf 20 \
            -maxrate 6000k \
            -bufsize 12000k \
            -x264-params "colorprim=bt2020:transfer=smpte2084:colormatrix=bt2020nc:depth=10" \
            -c:a aac -b:a 160k \
            -f flv \
            "rtmp://vsu.okcdn.ru/input/14596556267087_15801691998799_k5vbtvvaju"
