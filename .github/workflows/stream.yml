name: 2K Stream with Logo (170 min) trail only

on:
  workflow_dispatch:

jobs:
  stream:
    runs-on: ubuntu-latest
    timeout-minutes: 170    # ساعتين و50 دقيقة

    steps:
      - name: Install FFmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg wget

      - name: Download Logo
        run: |
          wget -O logo.png https://up6.cc/2026/06/178122590817961.png

      - name: Start 2K Stream with Logo
        run: |
          ffmpeg -re \
            -user_agent "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/148.0.0.0 Safari/537.36" \
            -referer "https://ostora-tv.hima-sabry2015.workers.dev/" \
            -headers "Origin: https://ostora-tv.hima-sabry2015.workers.dev\r\n" \
            -itsoffset 30 \
            -i "https://worldcup.dzandz496.workers.dev/BNMAX4KHDR.m3u8" \
            -i logo.png \
            -filter_complex "[0:v]scale=2560:1440,fps=25[bg];[1:v]scale=270:-1[logo];[bg][logo]overlay=W-w-40:H-h-40" \
            -c:v libx264 \
            -preset ultrafast \
            -tune zerolatency \
            -crf 28 \
            -g 120 \
            -c:a aac -b:a 128k \
            -maxrate 6000k \
            -bufsize 12000k \
            -f flv \
            "rtmp://vsu.okcdn.ru/input/14596556267087_15801691998799_k5vbtvvaju"
